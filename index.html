<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL to Markdown Converter</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Readability (本文抽出用: Firefoxのリーダービューと同じ技術) -->
    <script src="https://unpkg.com/@mozilla/readability@0.5.0/Readability.js"></script>
    <!-- Turndown (HTML -> Markdown変換用) -->
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    
    <style>
        /* カスタムスクロールバーなどの微調整 */
        body { background-color: #f3f4f6; }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        
        <!-- ヘッダー -->
        <div class="bg-slate-800 p-6 text-white">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                URL to Markdown
            </h1>
            <p class="text-slate-400 text-sm mt-2">複数のURLから本文を自動抽出し、1つのMarkdownファイルにまとめます。</p>
        </div>

        <!-- メインコンテンツ -->
        <div class="p-6 space-y-6">

            <!-- 注意書き -->
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 text-sm text-yellow-800">
                <p class="font-bold">⚠️ 注意事項</p>
                <ul class="list-disc list-inside mt-1 space-y-1">
                    <li>ログインが必要なページや有料記事には使用できません。</li>
                    <li>外部のプロキシサーバーを経由するため、機密情報の入力は避けてください。</li>
                    <li>サイトによってはセキュリティ対策で取得できない場合があります。</li>
                </ul>
            </div>

            <!-- 入力エリア -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">変換したい記事のURL（1行に1つ）</label>
                <textarea id="urls" rows="6" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-mono text-sm" placeholder="https://example.com/blog/article-1&#10;https://example.com/blog/article-2"></textarea>
            </div>

            <!-- アクションボタン -->
            <div class="flex items-center gap-4">
                <button id="convertBtn" onclick="startConversion()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition flex items-center gap-2 shadow-md">
                    <span>変換を実行</span>
                </button>
                <div id="statusArea" class="hidden flex items-center text-sm text-gray-600">
                    <div class="loader mr-2"></div>
                    <span id="statusText">準備中...</span>
                </div>
            </div>

            <!-- ログ出力 -->
            <div id="logArea" class="hidden">
                <h3 class="text-sm font-bold text-gray-700 mb-2">処理ログ</h3>
                <div id="logs" class="bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-xs h-40 overflow-y-auto whitespace-pre-wrap"></div>
            </div>

            <!-- ダウンロードエリア -->
            <div id="resultArea" class="hidden text-center bg-green-50 p-6 rounded-lg border border-green-200">
                <div class="text-green-800 font-bold text-lg mb-2">変換完了！</div>
                <p class="text-green-700 text-sm mb-4">すべての記事の処理が終わりました。</p>
                <button onclick="downloadMarkdown()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition flex items-center justify-center gap-2 mx-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    .mdファイルをダウンロード
                </button>
            </div>

        </div>
    </div>

    <script>
        // 設定
        const CORS_PROXY = "https://corsproxy.io/?"; 
        // 予備のプロキシ (必要に応じて切り替え): "https://api.allorigins.win/raw?url="
        
        let finalMarkdown = "";
        let isProcessing = false;

        // Turndownサービスの初期化（オプション設定）
        const turndownService = new TurndownService({
            headingStyle: 'atx',
            codeBlockStyle: 'fenced',
            bulletListMarker: '-'
        });
        
        // 不要な要素を削除するルールを追加
        turndownService.remove(['script', 'style', 'iframe', 'nav', 'footer']);

        // ログを追加する関数
        function addLog(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const color = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-gray-400');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `<div class="${color}">[${timestamp}] ${message}</div>`;
            logsDiv.innerHTML += logEntry;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        async function startConversion() {
            if (isProcessing) return;
            
            const urlText = document.getElementById('urls').value;
            const urls = urlText.split('\n').filter(u => u.trim().startsWith('http'));

            if (urls.length === 0) {
                alert("有効なURLを入力してください。");
                return;
            }

            // UIリセット
            isProcessing = true;
            finalMarkdown = "";
            document.getElementById('convertBtn').disabled = true;
            document.getElementById('convertBtn').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('statusArea').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('logArea').classList.remove('hidden');
            document.getElementById('logs').innerHTML = ""; // ログクリア

            addLog(`処理開始: 合計 ${urls.length} 件のURL`, 'info');

            // 各URLを処理
            for (let i = 0; i < urls.length; i++) {
                const url = urls[i].trim();
                document.getElementById('statusText').innerText = `処理中 (${i + 1}/${urls.length}): ${new URL(url).hostname}...`;
                
                try {
                    addLog(`取得中: ${url}...`);
                    
                    // プロキシ経由でFetch
                    const response = await fetch(CORS_PROXY + encodeURIComponent(url));
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const htmlText = await response.text();

                    // DOMパース
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");

                    // 相対リンクを絶対リンクに修正 (画像のリンク切れ防止など)
                    const base = document.createElement('base');
                    base.href = url;
                    doc.head.appendChild(base);

                    // Readabilityで本文抽出
                    // 以前のように自分でセレクタを指定する必要はありません
                    const reader = new Readability(doc);
                    const article = reader.parse();

                    if (article) {
                        addLog(`  -> 成功: "${article.title}" を抽出`, 'success');
                        
                        // Markdown変換
                        const markdown = turndownService.turndown(article.content);
                        
                        // 結合
                        finalMarkdown += `# ${article.title}\n\n`;
                        finalMarkdown += `> Source: ${url}\n\n`;
                        finalMarkdown += `${markdown}\n\n`;
                        finalMarkdown += `---\n\n`; // 区切り線
                    } else {
                        throw new Error("記事の本文を特定できませんでした");
                    }

                } catch (error) {
                    addLog(`  -> 失敗: ${error.message}`, 'error');
                    finalMarkdown += `# Error: ${url}\n\n取得または変換に失敗しました: ${error.message}\n\n---\n\n`;
                }

                // サーバー負荷軽減のため少し待機（1秒）
                await new Promise(r => setTimeout(r, 1000));
            }

            // 完了処理
            isProcessing = false;
            document.getElementById('convertBtn').disabled = false;
            document.getElementById('convertBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('statusArea').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            addLog("全処理完了。ダウンロード可能です。", 'success');
        }

        function downloadMarkdown() {
            if (!finalMarkdown) return;

            const blob = new Blob([finalMarkdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            // ファイル名を作成（現在日時を入れる）
            const date = new Date();
            const dateStr = date.toISOString().slice(0,10).replace(/-/g, '');
            a.download = `articles_archive_${dateStr}.md`;
            
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
