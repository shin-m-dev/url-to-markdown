<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL to Markdown Converter</title>
    <!-- ファビコン: アプリのアイコンと同じSVGを使用 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%233b82f6'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10' /%3E%3C/svg%3E">

    <!-- Tailwind CSS (self-hostビルド版) -->
    <link rel="stylesheet" href="tailwind.css">
    <!-- Readability v0.5.0 (本文抽出用 / Apache-2.0) 自前ホスティング -->
    <script src="vendor/readability.js"></script>
    <!-- Turndown v7.2.0 (HTML -> Markdown変換用 / MIT) 自前ホスティング -->
    <script src="vendor/turndown.js"></script>

    <style>
        body { background-color: #f3f4f6; }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">

        <!-- ヘッダー -->
        <div class="bg-slate-800 p-6 text-white">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                URL to Markdown
            </h1>
            <p class="text-slate-400 text-sm mt-2">複数のURLから本文を自動抽出し、1つのMarkdownファイルにまとめます。</p>
        </div>

        <!-- メインコンテンツ -->
        <div class="p-6 space-y-6">

            <!-- 注意書き -->
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 text-sm text-yellow-800">
                <p class="font-bold">⚠️ 注意事項</p>
                <ul class="list-disc list-inside mt-1 space-y-1">
                    <li>ログインが必要なページや有料記事には使用できません。</li>
                    <li>外部のプロキシサーバーを経由するため、機密情報の入力は避けてください。</li>
                    <li>サイトによってはセキュリティ対策で取得できない場合があります。</li>
                </ul>
            </div>

            <!-- 入力エリア -->
            <div>
                <label for="urls" class="block text-sm font-medium text-gray-700 mb-2">変換したい記事のURL（1行に1つ）</label>
                <textarea id="urls" rows="6" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-mono text-sm" placeholder="https://example.com/blog/article-1&#10;https://example.com/blog/article-2"></textarea>
            </div>

            <!-- アクションボタン -->
            <div class="flex items-center gap-4">
                <button id="convertBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition flex items-center gap-2 shadow-md">
                    <span>変換を実行</span>
                </button>
                <div id="statusArea" class="hidden flex items-center text-sm text-gray-600">
                    <div class="loader mr-2"></div>
                    <span id="statusText">準備中...</span>
                </div>
            </div>

            <!-- ログ出力 -->
            <div id="logArea" class="hidden">
                <h3 class="text-sm font-bold text-gray-700 mb-2">処理ログ</h3>
                <div id="logs" class="bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-xs h-40 overflow-y-auto whitespace-pre-wrap"></div>
            </div>

            <!-- ダウンロードエリア -->
            <div id="resultArea" class="hidden text-center bg-green-50 p-6 rounded-lg border border-green-200">
                <div class="text-green-800 font-bold text-lg mb-2">変換完了！</div>
                <p id="resultSummary" class="text-green-700 text-sm mb-4">すべての記事の処理が終わりました。</p>
                <button id="downloadBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition flex items-center justify-center gap-2 mx-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    .mdファイルをダウンロード
                </button>
            </div>

        </div>
    </div>

    <script>
        // ============================================================
        // 設定
        // ============================================================

        // CORSプロキシ（上から順に試行。1つ失敗しても次にフォールバック）
        // ※ corsproxy.io は現在 "?url=" パラメータ形式が必須（旧 "?<URL>" 形式は廃止）
        const PROXIES = [
            { name: 'corsproxy.io', build: (u) => 'https://corsproxy.io/?url=' + encodeURIComponent(u) },
            { name: 'allorigins',   build: (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u) },
            { name: 'codetabs',     build: (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u) },
        ];

        const FETCH_TIMEOUT_MS = 20000; // 1リクエストあたりのタイムアウト
        const WAIT_BETWEEN_URLS_MS = 800; // サーバー負荷軽減のための待機

        let finalMarkdown = "";
        let isProcessing = false;

        // Turndownサービスの遅延初期化
        // ※ トップレベルで new すると、CDN読み込み失敗時にReferenceErrorで
        //    スクリプト全体が停止し、ボタンすら動かなくなるため遅延化
        let _turndownService = null;
        function getTurndownService() {
            if (_turndownService) return _turndownService;
            _turndownService = new TurndownService({
                headingStyle: 'atx',
                codeBlockStyle: 'fenced',
                bulletListMarker: '-'
            });
            _turndownService.remove(['script', 'style', 'iframe', 'nav', 'footer', 'noscript']);
            return _turndownService;
        }

        // 必須ライブラリの読み込みチェック
        function checkLibraries() {
            const missing = [];
            if (typeof TurndownService === 'undefined') missing.push('Turndown');
            if (typeof Readability === 'undefined') missing.push('Readability');
            if (missing.length > 0) {
                alert(`ライブラリ (${missing.join(', ')}) の読み込みに失敗しました。\nCDNへの接続に問題がある可能性があります。ページを再読み込みしてください。`);
                return false;
            }
            return true;
        }

        // ============================================================
        // ユーティリティ
        // ============================================================

        // XSS対策: ログ表示前に必ずエスケープ（記事タイトルやエラー文字列にHTMLが混入し得るため）
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function addLog(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const color = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-gray-400');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = color;
            entry.textContent = `[${timestamp}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // タイムアウト付きfetch
        async function fetchWithTimeout(url, timeoutMs) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, { signal: controller.signal });
            } finally {
                clearTimeout(timer);
            }
        }

        // 文字コードを検出してデコード
        // response.text() はUTF-8固定のため、Shift_JIS / EUC-JP の
        // 日本語サイトが文字化けし、本文抽出に失敗する原因になっていた
        function decodeBody(buffer, contentTypeHeader) {
            let charset = null;

            // 1. HTTPヘッダーの charset を確認
            if (contentTypeHeader) {
                const m = contentTypeHeader.match(/charset=["']?([\w-]+)/i);
                if (m) charset = m[1];
            }

            // 2. HTML内の <meta charset> / <meta http-equiv> を確認（先頭4KBをASCII互換で仮読み）
            if (!charset) {
                const head = new TextDecoder('utf-8', { fatal: false })
                    .decode(buffer.slice(0, 4096));
                const m = head.match(/<meta[^>]+charset=["']?([\w-]+)/i);
                if (m) charset = m[1];
            }

            charset = (charset || 'utf-8').toLowerCase();
            // 表記ゆれの正規化
            if (charset === 'shift-jis' || charset === 'sjis' || charset === 'x-sjis') charset = 'shift_jis';

            try {
                return new TextDecoder(charset).decode(buffer);
            } catch (e) {
                // 未知のcharsetラベルはUTF-8にフォールバック
                return new TextDecoder('utf-8').decode(buffer);
            }
        }

        // プロキシを順に試してHTMLを取得
        async function fetchViaProxies(url) {
            let lastError = null;
            for (const proxy of PROXIES) {
                try {
                    const response = await fetchWithTimeout(proxy.build(url), FETCH_TIMEOUT_MS);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const buffer = await response.arrayBuffer();
                    if (buffer.byteLength === 0) throw new Error('空のレスポンス');

                    const html = decodeBody(buffer, response.headers.get('content-type'));

                    // プロキシ自身のエラーページを掴んでいないか簡易チェック
                    if (html.length < 200 && /error|denied|blocked/i.test(html)) {
                        throw new Error('プロキシがエラーページを返却');
                    }

                    addLog(`  -> 取得成功 (経由: ${proxy.name})`);
                    return html;
                } catch (error) {
                    const msg = error.name === 'AbortError' ? 'タイムアウト' : error.message;
                    addLog(`  -> ${proxy.name} 失敗: ${msg}。次のプロキシを試行...`, 'error');
                    lastError = error;
                }
            }
            throw new Error(`全プロキシで取得失敗 (最終エラー: ${lastError ? lastError.message : '不明'})`);
        }

        // 本文抽出: Readability優先、失敗時はセレクタベースのフォールバック
        function extractArticle(doc, url) {
            // Readabilityはdocを破壊的に変更するため、クローンを渡す
            let article = null;
            try {
                article = new Readability(doc.cloneNode(true)).parse();
            } catch (e) {
                // パース例外は握りつぶしてフォールバックへ
            }

            if (article && article.content && article.textContent.trim().length >= 100) {
                return { title: article.title || doc.title || url, content: article.content, method: 'Readability' };
            }

            // フォールバック: 一般的な本文コンテナを直接探す
            const el = doc.querySelector('article')
                || doc.querySelector('main')
                || doc.querySelector('.entry-content, .post-content, .article-body, #content')
                || doc.body;

            if (el && el.innerHTML.trim()) {
                return { title: doc.title || url, content: el.innerHTML, method: 'フォールバック抽出' };
            }

            return null;
        }

        // ============================================================
        // メイン処理
        // ============================================================

        async function startConversion() {
            if (isProcessing) return;
            if (!checkLibraries()) return;

            const urlText = document.getElementById('urls').value;
            const urls = urlText.split('\n')
                .map(u => u.trim())
                .filter(u => /^https?:\/\//i.test(u));

            if (urls.length === 0) {
                alert("有効なURLを入力してください。");
                return;
            }

            // UIリセット
            isProcessing = true;
            finalMarkdown = "";
            let successCount = 0;
            const convertBtn = document.getElementById('convertBtn');
            convertBtn.disabled = true;
            convertBtn.classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('statusArea').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('logArea').classList.remove('hidden');
            document.getElementById('logs').innerHTML = "";

            addLog(`処理開始: 合計 ${urls.length} 件のURL`);

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                let hostname = url;
                try { hostname = new URL(url).hostname; } catch (e) { /* 不正URLでも落とさない */ }
                document.getElementById('statusText').innerText = `処理中 (${i + 1}/${urls.length}): ${hostname}...`;

                try {
                    addLog(`取得中: ${url}`);
                    const htmlText = await fetchViaProxies(url);

                    // DOMパース
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");

                    // 相対リンクを絶対リンクに解決（Readabilityがbase要素を参照する）
                    const base = doc.createElement('base');
                    base.href = url;
                    doc.head.insertBefore(base, doc.head.firstChild);

                    const article = extractArticle(doc, url);
                    if (!article) throw new Error("記事の本文を特定できませんでした");

                    addLog(`  -> 成功: "${article.title}" を抽出 (${article.method})`, 'success');

                    const markdown = getTurndownService().turndown(article.content);

                    finalMarkdown += `# ${article.title}\n\n`;
                    finalMarkdown += `> Source: ${url}\n\n`;
                    finalMarkdown += `${markdown}\n\n`;
                    finalMarkdown += `---\n\n`;
                    successCount++;

                } catch (error) {
                    addLog(`  -> 失敗: ${error.message}`, 'error');
                    finalMarkdown += `# Error: ${url}\n\n取得または変換に失敗しました: ${error.message}\n\n---\n\n`;
                }

                if (i < urls.length - 1) {
                    await new Promise(r => setTimeout(r, WAIT_BETWEEN_URLS_MS));
                }
            }

            // 完了処理
            isProcessing = false;
            convertBtn.disabled = false;
            convertBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('statusArea').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('resultSummary').innerText =
                `${urls.length}件中 ${successCount}件の変換に成功しました。`;
            addLog(`全処理完了 (成功: ${successCount}/${urls.length})。ダウンロード可能です。`, 'success');
        }

        function downloadMarkdown() {
            if (!finalMarkdown) return;

            const blob = new Blob([finalMarkdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');

            const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            a.download = `articles_archive_${dateStr}.md`;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // イベント登録（inline onclickを廃止）
        document.getElementById('convertBtn').addEventListener('click', startConversion);
        document.getElementById('downloadBtn').addEventListener('click', downloadMarkdown);
    </script>
</body>
</html>
